name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release-Name (z.B. "Sprint 42", "Demo März")'
        required: false
        type: string
      plugins:
        description: 'Komma-separierte Plugin-IDs (leer = release-plugins.json)'
        required: false
        type: string
      create_release:
        description: 'GitHub Release erstellen'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Resolve version and plugin list
        id: meta
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf-8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          if [ -n "${{ inputs.plugins }}" ]; then
            PLUGINS="${{ inputs.plugins }}"
          else
            PLUGINS=$(node -e "
              const cfg = JSON.parse(require('fs').readFileSync('release-plugins.json','utf-8'));
              console.log(cfg.plugins.join(','));
            ")
          fi
          echo "plugin_list=$PLUGINS" >> "$GITHUB_OUTPUT"
          echo "Plugins für Release: $PLUGINS"

      - name: Build app
        run: npm run build-only

      - name: Build all plugins
        run: node scripts/build-plugins.js

      - name: Prepare plugins
        run: node scripts/prepare-plugins.js

      - name: Filter plugins
        run: |
          PLUGIN_LIST="${{ steps.meta.outputs.plugin_list }}"
          BUILT_PLUGINS=$(ls dist/plugins/ | grep -v index.json)

          for plugin in $BUILT_PLUGINS; do
            if ! echo ",$PLUGIN_LIST," | grep -q ",$plugin,"; then
              echo "- Entferne: $plugin"
              rm -rf "dist/plugins/$plugin"
            else
              echo "+ Behalte: $plugin"
            fi
          done

          node -e "
            const fs = require('fs');
            const path = require('path');
            const pluginsDir = 'dist/plugins';
            const modules = fs.readdirSync(pluginsDir)
              .filter(f => f !== 'index.json' && fs.statSync(path.join(pluginsDir, f)).isDirectory());
            const index = { name: 'Gene Plugins', version: '1.0.0', modules };
            fs.writeFileSync(path.join(pluginsDir, 'index.json'), JSON.stringify(index, null, 2));
            console.log('Release enthält ' + modules.length + ' Plugins:', modules.join(', '));
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gene-${{ steps.meta.outputs.version }}
          path: dist/
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          RELEASE_NAME="${{ inputs.release_name }}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION}"
          fi
          ZIP_NAME="gene-${VERSION}.zip"

          cd dist && zip -r "../${ZIP_NAME}" . && cd ..

          PLUGINS=$(node -e "
            const idx = JSON.parse(require('fs').readFileSync('dist/plugins/index.json','utf-8'));
            idx.modules.forEach(m => console.log('- ' + m));
          ")

          if [ -n "$RELEASE_NAME" ]; then
            TITLE="GenE ${VERSION} — ${RELEASE_NAME}"
          else
            TITLE="GenE ${VERSION}"
          fi

          # Delete existing release with same tag (if re-running)
          gh release delete "$TAG" --yes 2>/dev/null || true

          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" "$ZIP_NAME" \
            --title "$TITLE" \
            --notes "## GenE Release ${VERSION}

          ### Enthaltene Plugins
          ${PLUGINS}
          " \
            $PRERELEASE_FLAG
